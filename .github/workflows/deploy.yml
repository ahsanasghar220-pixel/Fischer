name: Deploy to Hostinger

# ─────────────────────────────────────────────────────────────────────────────
# How this works:
#
#   1. Build frontend (Vite)
#   2. Upload EVERYTHING via FTPS (port 21 — not blocked from GitHub Actions)
#      • lftp mirror does differential sync — only newer files transfer
#      • rsync over SSH port 65002 times out from GitHub Actions IPs
#
# Required GitHub secrets:
#   SSH_HOST            — Hostinger server hostname
#   SSH_USERNAME        — SSH username
#   SSH_PASSWORD        — SSH password
#   FTP_SERVER_DIR      — Remote path to app root WITH trailing slash
#                         e.g. "domains/example.com/public_html/fischer/"
#   VITE_API_URL        — Backend API URL for frontend build
#   DEPLOY_WEBHOOK_SECRET — Shared secret for post-deploy tasks
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Verify build exists
        run: |
          if [ ! -d "frontend/dist" ]; then
            echo "ERROR: frontend/dist not found"
            exit 1
          fi
          echo "✓ Build ready ($(du -sh frontend/dist | cut -f1))"

      # ─── Build full deployment package ──────────────────────────────────
      - name: Create deployment package
        run: |
          mkdir -p deploy

          # Backend PHP (no vendor — stays on server, install manually if needed)
          cp -r backend/* deploy/
          rm -rf deploy/vendor

          # Frontend build → public/  (includes images + videos)
          rsync -a frontend/dist/ deploy/public/

          # Clean up files we don't need on the server
          rm -rf deploy/tests deploy/storage/logs/*
          rm -f  deploy/.env.example deploy/.env.production deploy/phpunit.xml deploy/.env

          # Ensure empty storage/bootstrap dirs exist (Laravel needs these)
          mkdir -p \
            deploy/storage/app/public \
            deploy/storage/framework/cache \
            deploy/storage/framework/sessions \
            deploy/storage/framework/views \
            deploy/storage/logs \
            deploy/bootstrap/cache

          echo "=== Deploy package: $(du -sh deploy | cut -f1) ==="
          echo "=== Public dir: $(du -sh deploy/public | cut -f1) ==="
          echo "=== Images: $(du -sh deploy/public/images 2>/dev/null | cut -f1 || echo 'none') ==="
          echo "=== Videos: $(du -sh deploy/public/videos 2>/dev/null | cut -f1 || echo 'none') ==="

      # ─── FTP: upload via lftp mirror ──────────────────────────────────────
      - name: Deploy via FTPS
        run: |
          sudo apt-get install -qq -y lftp > /dev/null 2>&1

          echo "Uploading deploy package to ${{ secrets.FTP_SERVER_DIR }}..."

          # Retry up to 3 times — Hostinger FTP can be flaky from GitHub Actions
          for attempt in 1 2 3; do
            echo "--- FTP attempt $attempt/3 ---"
            if lftp -e "
              set ftp:ssl-force yes;
              set ftp:ssl-protect-data yes;
              set ssl:verify-certificate no;
              set net:max-retries 3;
              set net:timeout 60;
              set net:reconnect-interval-base 10;
              set net:reconnect-interval-multiplier 1;
              open -u ${{ secrets.SSH_USERNAME }},${{ secrets.SSH_PASSWORD }} ftp://${{ secrets.SSH_HOST }};

              # Step 1: Sync code/assets — only-newer (timestamps matter for PHP/JS/CSS)
              # Exclude images and videos — handled separately below
              mirror --reverse --verbose --only-newer --no-perms --parallel=4
                --exclude-glob .git*
                --exclude-glob .env
                --exclude-glob node_modules/
                --exclude-glob public/images/
                --exclude-glob public/videos/
                ./deploy/ ${{ secrets.FTP_SERVER_DIR }};

              # Step 2: Sync images — no-overwrite (skip files already on server)
              # Images are content-addressed by name; re-uploading identical files is wasteful.
              # To force-update an image, delete it from the server first.
              mirror --reverse --verbose --no-overwrite --no-perms --parallel=4
                --exclude-glob .git*
                ./deploy/public/images/ ${{ secrets.FTP_SERVER_DIR }}public/images/;

              # Step 3: Sync videos — no-overwrite (same logic as images)
              mirror --reverse --verbose --no-overwrite --no-perms --parallel=2
                --exclude-glob .git*
                ./deploy/public/videos/ ${{ secrets.FTP_SERVER_DIR }}public/videos/;

              bye"; then
              echo "✓ FTP upload complete"
              break
            fi
            if [ $attempt -lt 3 ]; then
              echo "Attempt $attempt failed — retrying in 15s..."
              sleep 15
            else
              echo "All 3 FTP attempts failed"
              exit 1
            fi
          done

      # ─── Patch production .env settings via SSH ────────────────────────────────
      # Reads the live .env, replaces MAIL_* keys, writes it back.
      # Note: Paymob credentials are stored in the DB via Admin → Settings → Payment.
      - name: Patch production .env settings
        env:
          SSH_HOST:            ${{ secrets.SSH_HOST }}
          SSH_PORT:            "65002"
          SSH_USER:            ${{ secrets.SSH_USERNAME }}
          SSH_PASS:            ${{ secrets.SSH_PASSWORD }}
          SERVER_ENV_PATH:     ${{ secrets.SERVER_ENV_PATH }}
          MAIL_MAILER:         "smtp"
          MAIL_HOST:           ${{ secrets.MAIL_HOST }}
          MAIL_PORT:           ${{ secrets.MAIL_PORT }}
          MAIL_USERNAME:       ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD:       ${{ secrets.MAIL_PASSWORD }}
          MAIL_ENCRYPTION:     ${{ secrets.MAIL_ENCRYPTION }}
          MAIL_FROM_ADDRESS:   ${{ secrets.MAIL_FROM_ADDRESS }}
          # Frontend URL — card payment callbacks redirect here after Safepay
          APP_FRONTEND_URL:    ${{ secrets.VITE_API_URL }}
        run: |
          pip install paramiko -q
          python3 scripts/patch-production-env.py

      # ─── Post-deploy: migrate, seed, cache ─────────────────────────────────────
      # Hits deploy-tasks.php directly (standalone PHP, no Laravel routing).
      # Hits deploy-tasks.php directly (standalone PHP, no Laravel routing).
      - name: Run post-deployment tasks
        run: |
          echo "Running migrations, seeders, and cache rebuild..."

          HTTP_STATUS=$(curl -s \
            --max-time 300 \
            -o /tmp/deploy_out.txt \
            -w "%{http_code}" \
            -H "X-Deploy-Secret: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}" \
            "https://fischer.codeformulator.com/deploy-tasks.php")

          echo "--- Server response (HTTP $HTTP_STATUS) ---"
          cat /tmp/deploy_out.txt | python3 -m json.tool 2>/dev/null || cat /tmp/deploy_out.txt | head -5
          echo ""

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "WARNING: Post-deploy tasks returned HTTP $HTTP_STATUS"
            exit 1
          fi

          if cat /tmp/deploy_out.txt | python3 -c "import sys,json; d=json.load(sys.stdin); sys.exit(0 if d.get('success') else 1)" 2>/dev/null; then
            echo "✓ Post-deployment tasks completed"
          else
            echo "WARNING: Post-deploy tasks reported failure — check output above"
            exit 1
          fi

      - name: Notify on success
        if: success()
        run: echo "✓ Deployment completed successfully!"

      - name: Notify on failure
        if: failure()
        run: echo "✗ Deployment failed — check the logs above"
