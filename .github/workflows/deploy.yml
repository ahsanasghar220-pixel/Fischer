name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Cache frontend build
        id: cache-build
        uses: actions/cache@v3
        with:
          path: frontend/dist
          key: ${{ runner.os }}-build-${{ hashFiles('frontend/src/**/*', 'frontend/index.html', 'frontend/vite.config.ts', 'frontend/tailwind.config.js') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Build frontend
        if: steps.cache-build.outputs.cache-hit != 'true'
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Verify build exists
        run: |
          if [ ! -d "frontend/dist" ]; then
            echo "ERROR: frontend/dist directory not found!"
            exit 1
          fi
          echo "✓ Build directory exists"
          ls -lh frontend/dist/ | head -10

      - name: Check if static assets changed
        id: check-assets
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -E "^frontend/public/(images|videos)/" || true)
          if [ -n "$CHANGED" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Static assets changed — will upload separately"
            echo "$CHANGED" | head -20
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No static asset changes — skipping asset upload"
          fi

      - name: Create deployment package (code only — no images/videos)
        run: |
          mkdir -p deploy

          # Backend files (no vendor)
          cp -r backend/* deploy/
          rm -rf deploy/vendor

          # Frontend build → public/ but EXCLUDE images/ and videos/
          # (large binary assets are already on the server from previous deploys
          #  and are only re-uploaded when they actually change — see next step)
          rsync -a --exclude='images/' --exclude='videos/' frontend/dist/ deploy/public/

          # Clean up unnecessary files
          rm -rf deploy/tests deploy/storage/logs/* deploy/.git
          rm -f deploy/.env.example deploy/phpunit.xml

          # Ensure required directories exist
          mkdir -p deploy/storage/app/public \
                   deploy/storage/framework/cache \
                   deploy/storage/framework/sessions \
                   deploy/storage/framework/views \
                   deploy/storage/logs \
                   deploy/bootstrap/cache

          echo "=== Code-only deploy package size ==="
          du -sh deploy/

      - name: Deploy code to Hostinger via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: "./deploy/*"
          target: ${{ secrets.SSH_SERVER_DIR }}
          strip_components: 1
          rm: false
          overwrite: true
          timeout: 60s
          command_timeout: 10m

      - name: Upload changed static assets (images/videos)
        if: steps.check-assets.outputs.changed == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: "frontend/dist/images/*,frontend/dist/videos/*"
          target: ${{ secrets.SSH_SERVER_DIR }}/public/
          strip_components: 2
          rm: false
          overwrite: true
          timeout: 60s
          command_timeout: 30m

      - name: Post-deployment tasks
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 15m
          script: |
            cd ${{ secrets.SSH_SERVER_DIR }}

            PHP=/opt/alt/php82/usr/bin/php

            echo "=== PHP Version ==="
            $PHP -v

            COMPOSER=$(which composer 2>/dev/null || echo "/usr/local/bin/composer")
            echo "=== Composer: $COMPOSER ==="

            if [ ! -d "vendor" ] || [ "composer.lock" -nt "vendor" ]; then
              echo "=== Installing composer dependencies ==="
              $PHP $COMPOSER install --no-dev --optimize-autoloader --no-interaction 2>&1 || \
              $PHP /opt/cpanel/composer/bin/composer install --no-dev --optimize-autoloader --no-interaction 2>&1 || \
              (curl -sS https://getcomposer.org/installer | $PHP && $PHP composer.phar install --no-dev --optimize-autoloader --no-interaction)
            else
              echo "=== Vendor up to date, skipping composer install ==="
            fi

            chmod -R 755 storage bootstrap/cache
            mkdir -p resources/views storage/app/public storage/framework/cache storage/framework/sessions storage/framework/views storage/logs bootstrap/cache

            if ! grep -q "APP_KEY=base64:" .env; then
              echo "=== Generating APP_KEY ==="
              $PHP artisan key:generate --force
            fi

            $PHP artisan config:clear

            echo "=== Running migrations ==="
            $PHP artisan migrate --force 2>&1

            echo "=== Queue Worker Status ==="
            ps aux | grep "queue:work" | grep -v grep || echo "WARNING: Queue worker not running"

            echo "=== Running safe seeders ==="
            $PHP artisan db:seed --class=ShippingZoneSeeder --force || true
            $PHP artisan db:seed --class=ShippingMethodSeeder --force || true
            $PHP artisan db:seed --class=RolePermissionSeeder --force || true
            $PHP artisan db:seed --class=HomepageSeeder --force || true
            $PHP artisan db:seed --class=PortfolioVideoSeeder --force || true
            echo "=== Safe seeders completed ==="

            if [ -f "SEED_ON_DEPLOY" ]; then
              echo "=== SEED_ON_DEPLOY detected, running additional seeders ==="
              $PHP artisan db:seed --class=CategorySeeder --force || true
              $PHP artisan db:seed --class=ProductSeeder --force || true
              $PHP artisan db:seed --class=ProductDataSeeder --force || true
              $PHP artisan db:seed --class=BannerSeeder --force || true
              $PHP artisan db:seed --class=HomepageSeeder --force || true
              $PHP artisan db:seed --class=SettingsSeeder --force || true
              $PHP artisan db:seed --class=PageSeeder --force || true
              rm -f SEED_ON_DEPLOY
              echo "=== Additional seeders completed ==="
            fi

            echo "=== Clearing caches ==="
            $PHP artisan cache:clear || true
            $PHP artisan config:clear
            $PHP artisan route:clear
            $PHP artisan view:clear || true

            echo "=== Rebuilding caches ==="
            $PHP artisan config:cache
            $PHP artisan route:cache
            $PHP artisan view:cache

            rm -rf public/storage
            ln -s ../storage/app/public public/storage
            echo "=== Storage link created ==="

            echo "=== Deployment completed successfully ==="
            $PHP artisan --version

      - name: Notify on success
        if: success()
        run: echo "Deployment completed successfully!"

      - name: Notify on failure
        if: failure()
        run: echo "Deployment failed!"
