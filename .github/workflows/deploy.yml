name: Deploy to Hostinger

# ─────────────────────────────────────────────────────────────────────────────
# How this works (avoids Hostinger's SSH/port-22 firewall block on GH Actions):
#
#   1. Build frontend (Vite)
#   2. Upload code via FTPS (port 21 — not blocked)
#      • Backend PHP + compiled frontend JS/CSS — small, fast
#      • Images/videos only when they actually changed — conditional
#   3. Trigger HTTPS webhook on the server (port 443 — always open)
#      • Server runs: composer install (if needed), migrate, seeders, cache
#
# Required GitHub secrets:
#   SSH_HOST            — Hostinger server hostname
#   SSH_USERNAME        — FTP/SSH username
#   SSH_PASSWORD        — FTP/SSH password
#   FTP_SERVER_DIR      — FTP path to app root WITH trailing slash
#                         e.g. "public_html/" or "domains/example.com/public_html/"
#   VITE_API_URL        — Backend API URL for frontend build
#   DEPLOY_WEBHOOK_SECRET — Random secret; also set in server .env
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Cache frontend build
        id: cache-build
        uses: actions/cache@v3
        with:
          path: frontend/dist
          key: ${{ runner.os }}-build-${{ hashFiles('frontend/src/**/*', 'frontend/public/**/*', 'frontend/index.html', 'frontend/vite.config.ts', 'frontend/tailwind.config.js') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Build frontend
        if: steps.cache-build.outputs.cache-hit != 'true'
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Verify build exists
        run: |
          if [ ! -d "frontend/dist" ]; then
            echo "ERROR: frontend/dist not found"
            exit 1
          fi
          echo "✓ Build ready ($(du -sh frontend/dist | cut -f1))"

      - name: Check if static assets changed
        id: check-assets
        run: |
          echo "changed=true" >> $GITHUB_OUTPUT
          echo "Always uploading images/videos to keep server in sync"

      # ─── Build code-only deployment package ────────────────────────────────
      - name: Create code deployment package
        run: |
          mkdir -p deploy

          # Backend PHP (no vendor — stays on server, updated by webhook if needed)
          cp -r backend/* deploy/
          rm -rf deploy/vendor

          # Frontend build → public/  (images/ and videos/ excluded — too large)
          rsync -a --exclude='images/' --exclude='videos/' frontend/dist/ deploy/public/

          # Clean up files we don't need on the server
          rm -rf deploy/tests deploy/storage/logs/*
          rm -f  deploy/.env.example deploy/phpunit.xml deploy/.env

          # Ensure empty storage/bootstrap dirs exist (Laravel needs these)
          mkdir -p \
            deploy/storage/app/public \
            deploy/storage/framework/cache \
            deploy/storage/framework/sessions \
            deploy/storage/framework/views \
            deploy/storage/logs \
            deploy/bootstrap/cache

          echo "=== Code package: $(du -sh deploy | cut -f1) ==="
          ls deploy/

      # ─── FTP: upload code ──────────────────────────────────────────────────
      - name: Deploy code via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          protocol: ftps
          local-dir: ./deploy/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/.env
            **/node_modules/**
          dangerous-clean-slate: false
          log-level: minimal

      # ─── FTP: wipe bootstrap/cache so stale route cache can't block webhook ──
      # Uses dangerous-clean-slate on the bootstrap/cache dir only — deletes the
      # stale routes-v7.php on the server so Laravel re-reads routes from source.
      - name: Clear bootstrap cache via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          protocol: ftps
          local-dir: ./deploy/bootstrap/cache/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}bootstrap/cache/
          dangerous-clean-slate: true
          log-level: standard

      # ─── lftp: upload images + videos ────────────────────────────────────────
      # NOTE: use ftp:// (not ftps://) + ftp:ssl-force = explicit FTPS on port 21.
      # ftps:// tries implicit FTPS on port 990 which hangs on Hostinger.
      # Shell-level timeout 300s prevents steps from hanging indefinitely.
      - name: Install lftp
        run: sudo apt-get install -y lftp 2>/dev/null | tail -1

      - name: Upload images via lftp
        run: |
          timeout 300 lftp -c "
            set net:timeout 30
            set ftp:ssl-force true
            set ssl:verify-certificate no
            set ftp:passive-mode true
            set net:reconnect-interval-base 5
            set net:max-retries 3
            open ftp://${{ secrets.SSH_HOST }}
            login ${{ secrets.SSH_USERNAME }} ${{ secrets.SSH_PASSWORD }}
            mirror --reverse --only-newer --verbose \
              ./frontend/public/images/ \
              ${{ secrets.FTP_SERVER_DIR }}public/images/
            bye
          " 2>&1 | tail -30
          echo "✓ Images upload done"

      - name: Upload videos via lftp
        run: |
          timeout 300 lftp -c "
            set net:timeout 30
            set ftp:ssl-force true
            set ssl:verify-certificate no
            set ftp:passive-mode true
            set net:reconnect-interval-base 5
            set net:max-retries 3
            open ftp://${{ secrets.SSH_HOST }}
            login ${{ secrets.SSH_USERNAME }} ${{ secrets.SSH_PASSWORD }}
            mirror --reverse --only-newer --verbose \
              ./frontend/public/videos/ \
              ${{ secrets.FTP_SERVER_DIR }}public/videos/
            bye
          " 2>&1 | tail -10
          echo "✓ Videos upload done"

      # ─── Webhook: composer + migrate + cache ──────────────────────────────
      # Uses GET /deploy-run — a web route in routes/web.php (not api.php).
      # Web routes have no api/ prefix and no route cache dependency — the
      # route loads directly from routes/web.php every request.
      - name: Run post-deployment tasks via webhook
        run: |
          echo "Triggering post-deployment tasks on server..."

          HTTP_STATUS=$(curl -s \
            --max-time 300 \
            -o /tmp/webhook_out.txt \
            -w "%{http_code}" \
            -H "X-Deploy-Secret: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}" \
            -H "Accept: application/json" \
            "https://fischer.codeformulator.com/deploy-run")

          echo "--- Server response (HTTP $HTTP_STATUS) ---"
          RESPONSE=$(cat /tmp/webhook_out.txt)
          echo "$RESPONSE" | python3 -m json.tool 2>/dev/null || echo "$RESPONSE" | head -5
          echo ""

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "ERROR: Webhook returned HTTP $HTTP_STATUS"
            exit 1
          fi

          # Detect if PHP/Laravel returned HTML instead of JSON
          if echo "$RESPONSE" | grep -q "<!DOCTYPE html>"; then
            echo "ERROR: Webhook returned HTML — Laravel routing issue on server"
            exit 1
          fi

          echo "✓ Post-deployment tasks completed"

      - name: Notify on success
        if: success()
        run: echo "✓ Deployment completed successfully!"

      - name: Notify on failure
        if: failure()
        run: echo "✗ Deployment failed — check the logs above"
