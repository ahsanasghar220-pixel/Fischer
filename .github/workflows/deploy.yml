name: Deploy to Hostinger

# ─────────────────────────────────────────────────────────────────────────────
# How this works (avoids Hostinger's SSH/port-22 firewall block on GH Actions):
#
#   1. Build frontend (Vite)
#   2. Upload EVERYTHING via FTPS (port 21 — not blocked)
#      • Backend PHP + compiled frontend JS/CSS/images/videos
#      • FTP-Deploy-Action does differential sync — only changed files transfer
#
# Required GitHub secrets:
#   SSH_HOST            — Hostinger server hostname
#   SSH_USERNAME        — FTP/SSH username
#   SSH_PASSWORD        — FTP/SSH password
#   FTP_SERVER_DIR      — FTP path to app root WITH trailing slash
#                         e.g. "public_html/" or "domains/example.com/public_html/"
#   VITE_API_URL        — Backend API URL for frontend build
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Verify build exists
        run: |
          if [ ! -d "frontend/dist" ]; then
            echo "ERROR: frontend/dist not found"
            exit 1
          fi
          echo "✓ Build ready ($(du -sh frontend/dist | cut -f1))"

      # ─── Build full deployment package ──────────────────────────────────
      - name: Create deployment package
        run: |
          mkdir -p deploy

          # Backend PHP (no vendor — stays on server, install manually if needed)
          cp -r backend/* deploy/
          rm -rf deploy/vendor

          # Frontend build → public/  (includes images + videos)
          rsync -a frontend/dist/ deploy/public/

          # Clean up files we don't need on the server
          rm -rf deploy/tests deploy/storage/logs/*
          rm -f  deploy/.env.example deploy/.env.production deploy/phpunit.xml deploy/.env

          # Ensure empty storage/bootstrap dirs exist (Laravel needs these)
          mkdir -p \
            deploy/storage/app/public \
            deploy/storage/framework/cache \
            deploy/storage/framework/sessions \
            deploy/storage/framework/views \
            deploy/storage/logs \
            deploy/bootstrap/cache

          echo "=== Deploy package: $(du -sh deploy | cut -f1) ==="
          echo "=== Public dir: $(du -sh deploy/public | cut -f1) ==="
          echo "=== Images: $(du -sh deploy/public/images 2>/dev/null | cut -f1 || echo 'none') ==="
          echo "=== Videos: $(du -sh deploy/public/videos 2>/dev/null | cut -f1 || echo 'none') ==="

      # ─── FTP: upload all files ─────────────────────────────────────────────
      # state-name forces a fresh sync — previous sync state missed new files.
      # After this succeeds, the v2 state file will be used for future diffs.
      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          protocol: ftps
          local-dir: ./deploy/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          state-name: .ftp-deploy-sync-state-v2.json
          exclude: |
            **/.git*
            **/.git*/**
            **/.env
            **/node_modules/**
          dangerous-clean-slate: false
          log-level: verbose

      - name: Notify on success
        if: success()
        run: echo "✓ Deployment completed successfully!"

      - name: Notify on failure
        if: failure()
        run: echo "✗ Deployment failed — check the logs above"
