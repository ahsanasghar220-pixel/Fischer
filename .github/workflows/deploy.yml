name: Deploy to Hostinger

# ─────────────────────────────────────────────────────────────────────────────
# How this works (avoids Hostinger's SSH/port-22 firewall block on GH Actions):
#
#   1. Build frontend (Vite)
#   2. Upload EVERYTHING via FTPS (port 21 — not blocked)
#      • Backend PHP + compiled frontend JS/CSS/images/videos
#      • FTP-Deploy-Action does differential sync — only changed files transfer
#   3. Trigger HTTPS webhook on the server (port 443 — always open)
#      • Server runs: composer install (if needed), migrate, seeders, cache
#
# Required GitHub secrets:
#   SSH_HOST            — Hostinger server hostname
#   SSH_USERNAME        — FTP/SSH username
#   SSH_PASSWORD        — FTP/SSH password
#   FTP_SERVER_DIR      — FTP path to app root WITH trailing slash
#                         e.g. "public_html/" or "domains/example.com/public_html/"
#   VITE_API_URL        — Backend API URL for frontend build
#   DEPLOY_WEBHOOK_SECRET — Random secret; also set in server .env
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Cache frontend build
        id: cache-build
        uses: actions/cache@v3
        with:
          path: frontend/dist
          key: ${{ runner.os }}-build-${{ hashFiles('frontend/src/**/*', 'frontend/public/**/*', 'frontend/index.html', 'frontend/vite.config.ts', 'frontend/tailwind.config.js') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Build frontend
        if: steps.cache-build.outputs.cache-hit != 'true'
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Verify build exists
        run: |
          if [ ! -d "frontend/dist" ]; then
            echo "ERROR: frontend/dist not found"
            exit 1
          fi
          echo "✓ Build ready ($(du -sh frontend/dist | cut -f1))"

      # ─── Build full deployment package ──────────────────────────────────
      - name: Create deployment package
        run: |
          mkdir -p deploy

          # Backend PHP (no vendor — stays on server, updated by webhook if needed)
          cp -r backend/* deploy/
          rm -rf deploy/vendor

          # Frontend build → public/  (includes images + videos)
          rsync -a frontend/dist/ deploy/public/

          # Clean up files we don't need on the server
          rm -rf deploy/tests deploy/storage/logs/*
          rm -f  deploy/.env.example deploy/.env.production deploy/phpunit.xml deploy/.env

          # Ensure empty storage/bootstrap dirs exist (Laravel needs these)
          mkdir -p \
            deploy/storage/app/public \
            deploy/storage/framework/cache \
            deploy/storage/framework/sessions \
            deploy/storage/framework/views \
            deploy/storage/logs \
            deploy/bootstrap/cache

          echo "=== Deploy package: $(du -sh deploy | cut -f1) ==="
          echo "=== Public dir: $(du -sh deploy/public | cut -f1) ==="
          echo "=== Images: $(du -sh deploy/public/images 2>/dev/null | cut -f1 || echo 'none') ==="
          echo "=== Videos: $(du -sh deploy/public/videos 2>/dev/null | cut -f1 || echo 'none') ==="

      # ─── FTP: upload code ──────────────────────────────────────────────────
      - name: Deploy code via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          protocol: ftps
          local-dir: ./deploy/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/.env
            **/node_modules/**
          dangerous-clean-slate: false
          log-level: minimal

      # ─── FTP: wipe bootstrap/cache so stale route cache can't block webhook ──
      # Uses dangerous-clean-slate on the bootstrap/cache dir only — deletes the
      # stale routes-v7.php on the server so Laravel re-reads routes from source.
      - name: Clear bootstrap cache via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          protocol: ftps
          local-dir: ./deploy/bootstrap/cache/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}bootstrap/cache/
          dangerous-clean-slate: true
          log-level: standard

      # ─── Health check: verify Laravel boots before running webhook ────────
      - name: Verify server health
        run: |
          echo "Checking server health..."
          HTTP_STATUS=$(curl -s --max-time 30 -o /tmp/health_out.txt -w "%{http_code}" \
            "https://fischer.codeformulator.com/up")

          echo "Health check: HTTP $HTTP_STATUS"
          cat /tmp/health_out.txt 2>/dev/null || true
          echo ""

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "WARNING: Health check returned HTTP $HTTP_STATUS — Laravel may not be booting"
            echo "Continuing anyway (webhook will clear caches)..."
          else
            echo "✓ Server is healthy"
          fi

      # ─── Webhook: composer + migrate + cache ──────────────────────────────
      # Uses GET /deploy-run — a web route in routes/web.php (not api.php).
      # Web routes have no api/ prefix and no route cache dependency — the
      # route loads directly from routes/web.php every request.
      - name: Run post-deployment tasks via webhook
        run: |
          echo "Triggering post-deployment tasks on server..."

          HTTP_STATUS=$(curl -s \
            --max-time 300 \
            -o /tmp/webhook_out.txt \
            -w "%{http_code}" \
            -H "X-Deploy-Secret: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}" \
            -H "Accept: application/json" \
            "https://fischer.codeformulator.com/deploy-run")

          echo "--- Server response (HTTP $HTTP_STATUS) ---"
          RESPONSE=$(cat /tmp/webhook_out.txt)
          echo "$RESPONSE" | python3 -m json.tool 2>/dev/null || echo "$RESPONSE" | head -5
          echo ""

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "ERROR: Webhook returned HTTP $HTTP_STATUS"
            exit 1
          fi

          # Detect if PHP/Laravel returned HTML instead of JSON
          if echo "$RESPONSE" | grep -q "<!DOCTYPE html>"; then
            echo "ERROR: Webhook returned HTML — Laravel routing issue on server"
            exit 1
          fi

          # Verify the webhook actually succeeded (not just HTTP 200)
          if echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); sys.exit(0 if d.get('success') else 1)" 2>/dev/null; then
            echo "✓ Post-deployment tasks completed successfully"
          else
            echo "ERROR: Webhook returned success=false — check output above"
            exit 1
          fi

      - name: Notify on success
        if: success()
        run: echo "✓ Deployment completed successfully!"

      - name: Notify on failure
        if: failure()
        run: echo "✗ Deployment failed — check the logs above"
