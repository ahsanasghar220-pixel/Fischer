name: Deploy to Hostinger

# ─────────────────────────────────────────────────────────────────────────────
# How this works:
#
#   1. Build frontend (Vite)
#   2. Upload EVERYTHING via rsync over SSH (port 65002)
#      • Single TCP connection — no passive-mode data ports that can get blocked
#      • rsync --checksum differential sync — only changed files transfer
#      • Far more reliable than FTPS which randomly hangs on passive data ports
#
# Required GitHub secrets:
#   SSH_HOST            — Hostinger server hostname
#   SSH_USERNAME        — SSH username
#   SSH_PASSWORD        — SSH password
#   FTP_SERVER_DIR      — Remote path to app root WITH trailing slash
#                         e.g. "domains/example.com/public_html/fischer/"
#   VITE_API_URL        — Backend API URL for frontend build
#   DEPLOY_WEBHOOK_SECRET — Shared secret for post-deploy tasks
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Verify build exists
        run: |
          if [ ! -d "frontend/dist" ]; then
            echo "ERROR: frontend/dist not found"
            exit 1
          fi
          echo "✓ Build ready ($(du -sh frontend/dist | cut -f1))"

      # ─── Build full deployment package ──────────────────────────────────
      - name: Create deployment package
        run: |
          mkdir -p deploy

          # Backend PHP (no vendor — stays on server, install manually if needed)
          cp -r backend/* deploy/
          rm -rf deploy/vendor

          # Frontend build → public/  (includes images + videos)
          rsync -a frontend/dist/ deploy/public/

          # Clean up files we don't need on the server
          rm -rf deploy/tests deploy/storage/logs/*
          rm -f  deploy/.env.example deploy/.env.production deploy/phpunit.xml deploy/.env

          # Ensure empty storage/bootstrap dirs exist (Laravel needs these)
          mkdir -p \
            deploy/storage/app/public \
            deploy/storage/framework/cache \
            deploy/storage/framework/sessions \
            deploy/storage/framework/views \
            deploy/storage/logs \
            deploy/bootstrap/cache

          echo "=== Deploy package: $(du -sh deploy | cut -f1) ==="
          echo "=== Public dir: $(du -sh deploy/public | cut -f1) ==="
          echo "=== Images: $(du -sh deploy/public/images 2>/dev/null | cut -f1 || echo 'none') ==="
          echo "=== Videos: $(du -sh deploy/public/videos 2>/dev/null | cut -f1 || echo 'none') ==="

      # ─── Upload via rsync over SSH port 65002 ────────────────────────────────
      # Why rsync over SSH instead of FTPS:
      #   FTPS needs TWO connections — control (port 21) + data (random passive ports).
      #   Those passive ports get randomly blocked from GitHub Actions IPs, causing lftp
      #   to hang indefinitely with no timeout. rsync over SSH uses a SINGLE connection
      #   on port 65002 which is always reachable. Clean fail if unreachable, never hangs.
      - name: Deploy via rsync over SSH
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sudo apt-get install -qq -y sshpass > /dev/null 2>&1

          SSH_OPTS="-p 65002 -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o ServerAliveInterval=15 -o ServerAliveCountMax=4"
          DEST="${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:${{ secrets.FTP_SERVER_DIR }}"

          echo "Uploading to ${{ secrets.SSH_HOST }}:${{ secrets.FTP_SERVER_DIR }}..."
          echo "Package size: $(du -sh deploy | cut -f1)"

          for attempt in 1 2 3; do
            echo "--- rsync attempt $attempt/3 ---"
            if timeout 600 sshpass -e rsync \
                -az \
                --delete \
                --timeout=120 \
                -e "ssh $SSH_OPTS" \
                --exclude='.git*' \
                --exclude='.env' \
                --exclude='node_modules/' \
                ./deploy/ \
                "$DEST"; then
              echo "✓ rsync upload complete"
              break
            fi
            if [ $attempt -lt 3 ]; then
              echo "Attempt $attempt failed — retrying in 10s..."
              sleep 10
            else
              echo "All 3 rsync attempts failed"
              exit 1
            fi
          done

      # ─── Post-deploy: migrate, seed, cache ─────────────────────────────────
      # Hits deploy-tasks.php directly (standalone PHP, no Laravel routing).
      # This is why it works — previous webhook failed because FTP-Deploy-Action
      # never actually uploaded the PHP file due to .in.* rename failures.
      - name: Run post-deployment tasks
        run: |
          echo "Running migrations, seeders, and cache rebuild..."

          HTTP_STATUS=$(curl -s \
            --max-time 300 \
            -o /tmp/deploy_out.txt \
            -w "%{http_code}" \
            -H "X-Deploy-Secret: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}" \
            "https://fischer.codeformulator.com/deploy-tasks.php")

          echo "--- Server response (HTTP $HTTP_STATUS) ---"
          cat /tmp/deploy_out.txt | python3 -m json.tool 2>/dev/null || cat /tmp/deploy_out.txt | head -5
          echo ""

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "WARNING: Post-deploy tasks returned HTTP $HTTP_STATUS"
            exit 1
          fi

          if cat /tmp/deploy_out.txt | python3 -c "import sys,json; d=json.load(sys.stdin); sys.exit(0 if d.get('success') else 1)" 2>/dev/null; then
            echo "✓ Post-deployment tasks completed"
          else
            echo "WARNING: Post-deploy tasks reported failure — check output above"
            exit 1
          fi

      # ─── Patch production .env mail settings via SSH ───────────────────────────
      # Reads the live .env, replaces MAIL_* keys, writes it back.
      # Only runs when MAIL_HOST secret is set — safe to skip if not configured.
      # Required new GitHub secrets: MAIL_HOST, MAIL_PORT, MAIL_USERNAME,
      #   MAIL_PASSWORD, MAIL_ENCRYPTION, MAIL_FROM_ADDRESS, SERVER_ENV_PATH
      - name: Patch production .env settings
        env:
          SSH_HOST:            ${{ secrets.SSH_HOST }}
          SSH_PORT:            "65002"
          SSH_USER:            ${{ secrets.SSH_USERNAME }}
          SSH_PASS:            ${{ secrets.SSH_PASSWORD }}
          SERVER_ENV_PATH:     ${{ secrets.SERVER_ENV_PATH }}
          MAIL_MAILER:         "smtp"
          MAIL_HOST:           ${{ secrets.MAIL_HOST }}
          MAIL_PORT:           ${{ secrets.MAIL_PORT }}
          MAIL_USERNAME:       ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD:       ${{ secrets.MAIL_PASSWORD }}
          MAIL_ENCRYPTION:     ${{ secrets.MAIL_ENCRYPTION }}
          MAIL_FROM_ADDRESS:   ${{ secrets.MAIL_FROM_ADDRESS }}
          CHECKOUT_PUBLIC_KEY: "pk_sbox_dfprv2nosgcw4nw3iwd7fvu2gi4"
          CHECKOUT_SECRET_KEY: "633C70ADFEDF1C399905C35A1F40A778"
          CHECKOUT_SANDBOX:    "true"
        run: |
          pip install paramiko -q
          python3 scripts/patch-production-env.py

      - name: Notify on success
        if: success()
        run: echo "✓ Deployment completed successfully!"

      - name: Notify on failure
        if: failure()
        run: echo "✗ Deployment failed — check the logs above"
